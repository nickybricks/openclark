name: OpenClark
options:
  bundleIdPrefix: com.nickybricks
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  minimumXcodeGenVersion: "2.40"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_EMIT_LOC_STRINGS: "YES"

targets:
  OpenClark:
    type: application
    platform: macOS
    sources:
      - OpenClark
    defaultLocalization: de
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickybricks.openclark
        PRODUCT_NAME: OpenClark
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OpenClark/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: GRDB
    info:
      path: OpenClark/Info.plist
      properties:
        CFBundleName: OpenClark
        CFBundleDisplayName: OpenClark
        CFBundleIdentifier: com.nickybricks.openclark
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: OpenClark
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true

  OpenClarkCLI:
    type: tool
    platform: macOS
    sources:
      - OpenClarkCLI
      - path: OpenClark/Core
        excludes:
          - "FileWatcher.swift"
          - "FileProcessor.swift"
          - "SnapshotManager.swift"
      - OpenClark/LLM
      - OpenClark/Database
      - OpenClark/Config
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickybricks.openclark-cli
        PRODUCT_NAME: openclark
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: GRDB
